<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coresi OS — Регистрация подтверждена</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0A0A1A;
      color: #E2E8F0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .icon {
      font-size: 64px;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #FFFFFF;
    }
    .brand {
      color: #6366F1;
      font-weight: 800;
      letter-spacing: 2px;
      font-size: 14px;
      margin-bottom: 24px;
    }
    p {
      font-size: 16px;
      line-height: 1.6;
      color: #94A3B8;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-block;
      background: #6366F1;
      color: white;
      padding: 14px 32px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .hint {
      font-size: 13px;
      color: #64748B;
      margin-top: 24px;
      line-height: 1.5;
    }
    .redirect-msg {
      font-size: 13px;
      color: #6366F1;
      margin-top: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">&#10003;</div>
    <div class="brand">CORESI OS</div>
    <h1>Email подтверждён!</h1>
    <p>Ваша регистрация завершена. Теперь вы можете войти в приложение.</p>
    <a href="coresi://" class="btn" id="openApp">Открыть Coresi OS</a>
    <p class="hint">
      Если приложение не открылось автоматически, откройте Coresi OS на вашем устройстве и нажмите "Войти".
    </p>
    <p class="redirect-msg" id="redirectMsg">
      Перенаправляем в приложение...
    </p>
  </div>
  <script>
    // Try to redirect to app after 1.5 seconds
    setTimeout(function() {
      var msg = document.getElementById('redirectMsg');
      if (msg) msg.style.display = 'block';
      window.location.href = 'coresi://';
    }, 1500);
  </script>
</body>
</html>
